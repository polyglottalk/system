name: Enforce Branch Flow

on:
  pull_request_target:
    branches:
      - main
    types: [opened, reopened, synchronize]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Only allow PRs from develop
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "❌ PRs to main are only allowed from the 'develop' branch."
            echo "Source branch was: ${{ github.head_ref }}"
            exit 1
          fi
          echo "✅ Source branch is 'develop'. Proceeding."
